<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Down Racing Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .game-wrapper {
      text-align: center;
    }

    canvas {
      background: #2e8b57;
      border: 3px solid white;
      display: block;
      margin: 0 auto;
    }

    .instructions {
      margin-top: 10px;
      font-size: 14px;
      color: #ddd;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div class="instructions">
      Drive: Arrow Keys or WASD | Reset: R | Complete 3 laps as fast as possible!
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    const keys = {};

    const TOTAL_LAPS = 3;

    let gameStarted = false;
    let raceFinished = false;
    let startTime = null;
    let finishTime = null;

    const car = {
      x: 450,
      y: 500,
      width: 26,
      height: 42,
      angle: -Math.PI / 2,
      speed: 0,
      maxTrackSpeed: 5.3,
      maxGrassSpeed: 2.0,
      acceleration: 0.16,
      braking: 0.22,
      friction: 0.96,
      turnSpeed: 0.055
    };

    let lap = 0;
    let hasPassedCheckpoint = false;

    const startFinishLine = {
      x: 430,
      y: 500,
      width: 90,
      height: 8
    };

    const checkpoint = {
      x: 430,
      y: 90,
      width: 90,
      height: 8
    };

    // Track is drawn as thick rounded lines. These same line segments are used to detect whether the car is on track.
    const trackSegments = [
      { x1: 450, y1: 500, x2: 760, y2: 500 },
      { x1: 760, y1: 500, x2: 810, y2: 330 },
      { x1: 810, y1: 330, x2: 700, y2: 120 },
      { x1: 700, y1: 120, x2: 450, y2: 90 },
      { x1: 450, y1: 90, x2: 190, y2: 130 },
      { x1: 190, y1: 130, x2: 120, y2: 330 },
      { x1: 120, y1: 330, x2: 250, y2: 500 },
      { x1: 250, y1: 500, x2: 450, y2: 500 }
    ];

    const TRACK_WIDTH = 120;

    document.addEventListener("keydown", (event) => {
      keys[event.key] = true;

      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(event.key)) {
        event.preventDefault();
      }

      if (event.key === "r" || event.key === "R") {
        resetRace();
      }
    });

    document.addEventListener("keyup", (event) => {
      keys[event.key] = false;
    });

    function resetRace() {
      car.x = 450;
      car.y = 500;
      car.angle = -Math.PI / 2;
      car.speed = 0;
      lap = 0;
      hasPassedCheckpoint = false;
      gameStarted = false;
      raceFinished = false;
      startTime = null;
      finishTime = null;
    }

    function distancePointToSegment(px, py, x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;

      if (dx === 0 && dy === 0) {
        return Math.hypot(px - x1, py - y1);
      }

      let t = ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy);
      t = Math.max(0, Math.min(1, t));

      const closestX = x1 + t * dx;
      const closestY = y1 + t * dy;

      return Math.hypot(px - closestX, py - closestY);
    }

    function isOnTrack(x, y) {
      return trackSegments.some(segment => {
        const distance = distancePointToSegment(x, y, segment.x1, segment.y1, segment.x2, segment.y2);
        return distance <= TRACK_WIDTH / 2;
      });
    }

    function rectContainsPoint(rect, x, y) {
      return x >= rect.x && x <= rect.x + rect.width && y >= rect.y && y <= rect.y + rect.height;
    }

    function updateCar() {
      if (raceFinished) return;

      const accelerating = keys["ArrowUp"] || keys["w"] || keys["W"];
      const reversing = keys["ArrowDown"] || keys["s"] || keys["S"];
      const turningLeft = keys["ArrowLeft"] || keys["a"] || keys["A"];
      const turningRight = keys["ArrowRight"] || keys["d"] || keys["D"];

      if (accelerating || reversing) {
        if (!gameStarted) {
          gameStarted = true;
          startTime = performance.now();
        }
      }

      const onTrack = isOnTrack(car.x, car.y);
      const maxSpeed = onTrack ? car.maxTrackSpeed : car.maxGrassSpeed;

      if (accelerating) {
        car.speed += car.acceleration;
      }

      if (reversing) {
        car.speed -= car.braking;
      }

      car.speed *= car.friction;
      car.speed = Math.max(-maxSpeed / 2, Math.min(maxSpeed, car.speed));

      if (Math.abs(car.speed) > 0.2) {
        const direction = car.speed > 0 ? 1 : -1;

        if (turningLeft) {
          car.angle -= car.turnSpeed * direction;
        }

        if (turningRight) {
          car.angle += car.turnSpeed * direction;
        }
      }

      car.x += Math.cos(car.angle) * car.speed;
      car.y += Math.sin(car.angle) * car.speed;

      car.x = Math.max(20, Math.min(WIDTH - 20, car.x));
      car.y = Math.max(20, Math.min(HEIGHT - 20, car.y));

      updateLapLogic();
    }

    function updateLapLogic() {
      if (rectContainsPoint(checkpoint, car.x, car.y)) {
        hasPassedCheckpoint = true;
      }

      if (rectContainsPoint(startFinishLine, car.x, car.y) && hasPassedCheckpoint) {
        lap += 1;
        hasPassedCheckpoint = false;

        if (lap >= TOTAL_LAPS) {
          raceFinished = true;
          finishTime = performance.now();
          car.speed = 0;
        }
      }
    }

    function getElapsedTime() {
      if (!gameStarted) return 0;
      if (raceFinished) return (finishTime - startTime) / 1000;
      return (performance.now() - startTime) / 1000;
    }

    function formatTime(seconds) {
      const minutes = Math.floor(seconds / 60);
      const remainingSeconds = seconds % 60;
      return `${minutes}:${remainingSeconds.toFixed(2).padStart(5, "0")}`;
    }

    function drawGrass() {
      ctx.fillStyle = "#2e8b57";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Slight grass texture
      ctx.strokeStyle = "rgba(255,255,255,0.05)";
      for (let x = 0; x < WIDTH; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x - 80, HEIGHT);
        ctx.stroke();
      }
    }

    function drawTrack() {
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = TRACK_WIDTH;
      ctx.strokeStyle = "#444";

      ctx.beginPath();
      ctx.moveTo(trackSegments[0].x1, trackSegments[0].y1);
      for (const segment of trackSegments) {
        ctx.lineTo(segment.x2, segment.y2);
      }
      ctx.stroke();

      // Inner dashed road line
      ctx.lineWidth = 4;
      ctx.setLineDash([20, 20]);
      ctx.strokeStyle = "#ddd";
      ctx.beginPath();
      ctx.moveTo(trackSegments[0].x1, trackSegments[0].y1);
      for (const segment of trackSegments) {
        ctx.lineTo(segment.x2, segment.y2);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawRaceLines() {
      // Start/finish line
      ctx.fillStyle = "white";
      ctx.fillRect(startFinishLine.x, startFinishLine.y, startFinishLine.width, startFinishLine.height);
      ctx.fillStyle = "black";
      for (let i = 0; i < startFinishLine.width; i += 15) {
        ctx.fillRect(startFinishLine.x + i, startFinishLine.y, 8, startFinishLine.height);
      }

      // Checkpoint line
      ctx.fillStyle = "rgba(255, 215, 0, 0.8)";
      ctx.fillRect(checkpoint.x, checkpoint.y, checkpoint.width, checkpoint.height);
    }

    function drawCar() {
      ctx.save();
      ctx.translate(car.x, car.y);
      ctx.rotate(car.angle + Math.PI / 2);

      // Car body
      ctx.fillStyle = "#e63946";
      ctx.fillRect(-car.width / 2, -car.height / 2, car.width, car.height);

      // Windshield
      ctx.fillStyle = "#a8dadc";
      ctx.fillRect(-car.width / 2 + 4, -car.height / 2 + 7, car.width - 8, 10);

      // Rear window
      ctx.fillStyle = "#1d3557";
      ctx.fillRect(-car.width / 2 + 5, car.height / 2 - 14, car.width - 10, 8);

      // Wheels
      ctx.fillStyle = "#111";
      ctx.fillRect(-car.width / 2 - 4, -car.height / 2 + 5, 5, 12);
      ctx.fillRect(car.width / 2 - 1, -car.height / 2 + 5, 5, 12);
      ctx.fillRect(-car.width / 2 - 4, car.height / 2 - 17, 5, 12);
      ctx.fillRect(car.width / 2 - 1, car.height / 2 - 17, 5, 12);

      ctx.restore();
    }

    function drawHud() {
      const elapsed = getElapsedTime();
      const onTrack = isOnTrack(car.x, car.y);

      ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
      ctx.fillRect(15, 15, 310, 110);

      ctx.fillStyle = "white";
      ctx.font = "24px Arial";
      ctx.fillText(`Lap: ${Math.min(lap + 1, TOTAL_LAPS)} / ${TOTAL_LAPS}`, 30, 45);
      ctx.fillText(`Time: ${formatTime(elapsed)}`, 30, 78);

      ctx.font = "18px Arial";
      ctx.fillStyle = onTrack ? "#90ee90" : "#ffd166";
      ctx.fillText(onTrack ? "Surface: Track - full speed" : "Surface: Grass - slowed down", 30, 108);

      if (!gameStarted) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
        ctx.fillRect(WIDTH / 2 - 230, HEIGHT / 2 - 60, 460, 120);
        ctx.fillStyle = "white";
        ctx.font = "28px Arial";
        ctx.fillText("Top Down Racing", WIDTH / 2 - 115, HEIGHT / 2 - 15);
        ctx.font = "18px Arial";
        ctx.fillText("Press Up/W or Down/S to start the timer", WIDTH / 2 - 160, HEIGHT / 2 + 25);
      }

      if (raceFinished) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
        ctx.fillRect(WIDTH / 2 - 250, HEIGHT / 2 - 80, 500, 160);
        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText("Race Finished!", WIDTH / 2 - 105, HEIGHT / 2 - 30);
        ctx.font = "24px Arial";
        ctx.fillText(`Final Time: ${formatTime(elapsed)}`, WIDTH / 2 - 105, HEIGHT / 2 + 10);
        ctx.font = "18px Arial";
        ctx.fillText("Press R to race again", WIDTH / 2 - 85, HEIGHT / 2 + 45);
      }
    }

    function gameLoop() {
      updateCar();

      drawGrass();
      drawTrack();
      drawRaceLines();
      drawCar();
      drawHud();

      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
