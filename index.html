<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Alien Ship Shooter</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    canvas {
      background: black;
      border: 2px solid white;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    const player = {
      x: WIDTH / 2 - 25,
      y: HEIGHT - 70,
      width: 50,
      height: 35,
      speed: 7
    };

    const bullets = [];
    const aliens = [];
    const stars = [];

    let score = 0;
    let lives = 3;
    let spawnTimer = 0;
    let spawnDelay = 40;
    let gameOver = false;

    const keys = {};

    for (let i = 0; i < 60; i++) {
      stars.push({
        x: Math.random() * WIDTH,
        y: Math.random() * HEIGHT,
        speed: 0.5 + Math.random() * 1.5
      });
    }

    document.addEventListener("keydown", (event) => {
      keys[event.key] = true;

      if (event.code === "Space" && !gameOver) {
        shoot();
      }

      if ((event.key === "r" || event.key === "R") && gameOver) {
        resetGame();
      }
    });

    document.addEventListener("keyup", (event) => {
      keys[event.key] = false;
    });

    function shoot() {
      bullets.push({
        x: player.x + player.width / 2 - 2.5,
        y: player.y,
        width: 5,
        height: 12,
        speed: 9
      });
    }

    function spawnAlien() {
      const alienWidth = 50;
      const alienHeight = 35;

      aliens.push({
        x: Math.random() * (WIDTH - alienWidth),
        y: -alienHeight,
        width: alienWidth,
        height: alienHeight,
        speed: 3
      });
    }

    function movePlayer() {
      if (keys["ArrowLeft"] || keys["a"] || keys["A"]) {
        player.x -= player.speed;
      }

      if (keys["ArrowRight"] || keys["d"] || keys["D"]) {
        player.x += player.speed;
      }

      if (player.x < 0) {
        player.x = 0;
      }

      if (player.x + player.width > WIDTH) {
        player.x = WIDTH - player.width;
      }
    }

    function updateBullets() {
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= bullets[i].speed;

        if (bullets[i].y + bullets[i].height < 0) {
          bullets.splice(i, 1);
        }
      }
    }

    function updateAliens() {
      for (let i = aliens.length - 1; i >= 0; i--) {
        aliens[i].y += aliens[i].speed;

        if (aliens[i].y > HEIGHT) {
          aliens.splice(i, 1);
          lives--;

          if (lives <= 0) {
            gameOver = true;
          }
        }
      }
    }

    function checkCollision(rect1, rect2) {
      return (
        rect1.x < rect2.x + rect2.width &&
        rect1.x + rect1.width > rect2.x &&
        rect1.y < rect2.y + rect2.height &&
        rect1.y + rect1.height > rect2.y
      );
    }

    function checkCollisions() {
      for (let b = bullets.length - 1; b >= 0; b--) {
        for (let a = aliens.length - 1; a >= 0; a--) {
          if (checkCollision(bullets[b], aliens[a])) {
            bullets.splice(b, 1);
            aliens.splice(a, 1);
            score++;
            break;
          }
        }
      }
    }

    function updateStars() {
      stars.forEach((star) => {
        star.y += star.speed;

        if (star.y > HEIGHT) {
          star.y = 0;
          star.x = Math.random() * WIDTH;
        }
      });
    }

    function drawStars() {
      ctx.fillStyle = "white";

      stars.forEach((star) => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, 1.5, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawPlayer() {
      ctx.fillStyle = "rgb(70, 140, 255)";
      ctx.beginPath();
      ctx.moveTo(player.x + player.width / 2, player.y);
      ctx.lineTo(player.x, player.y + player.height);
      ctx.lineTo(player.x + player.width, player.y + player.height);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "white";
      ctx.fillRect(player.x + player.width / 2 - 4, player.y + 15, 8, 8);
    }

    function drawBullets() {
      ctx.fillStyle = "rgb(255, 230, 80)";
      bullets.forEach((bullet) => {
        ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
      });
    }

    function drawAliens() {
      aliens.forEach((alien) => {
        ctx.fillStyle = "rgb(230, 60, 60)";
        ctx.beginPath();
        ctx.ellipse(
          alien.x + alien.width / 2,
          alien.y + alien.height / 2,
          alien.width / 2,
          alien.height / 2,
          0,
          0,
          Math.PI * 2
        );
        ctx.fill();

        ctx.fillStyle = "rgb(80, 220, 120)";
        ctx.fillRect(alien.x + 10, alien.y + 10, alien.width - 20, 8);
      });
    }

    function drawHud() {
      ctx.fillStyle = "white";
      ctx.font = "32px Arial";
      ctx.fillText(`Score: ${score}   Lives: ${lives}`, 20, 40);
    }

    function drawGameOver() {
      ctx.fillStyle = "white";
      ctx.font = "34px Arial";
      ctx.fillText("GAME OVER", WIDTH / 2 - 100, HEIGHT / 2 - 20);

      ctx.font = "24px Arial";
      ctx.fillText("Press R to Restart", WIDTH / 2 - 100, HEIGHT / 2 + 25);
    }

    function resetGame() {
      score = 0;
      lives = 3;
      bullets.length = 0;
      aliens.length = 0;
      player.x = WIDTH / 2 - player.width / 2;
      gameOver = false;
    }

    function gameLoop() {
      ctx.clearRect(0, 0, WIDTH, HEIGHT);

      updateStars();
      drawStars();

      if (!gameOver) {
        movePlayer();

        spawnTimer++;
        if (spawnTimer >= spawnDelay) {
          spawnAlien();
          spawnTimer = 0;
        }

        updateBullets();
        updateAliens();
        checkCollisions();
      }

      drawPlayer();
      drawBullets();
      drawAliens();
      drawHud();

      if (gameOver) {
        drawGameOver();
      }

      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
